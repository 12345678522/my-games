<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxy Vanguard - Arcade Edition</title>
    <style>
        body { margin: 0; padding: 0; background-color: #050505; color: #fff; font-family: 'Courier New', Courier, monospace; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; user-select: none; }
        .game-container { position: relative; max-height: 100vh; max-width: 100vw; box-shadow: 0 0 50px rgba(0, 255, 255, 0.15); }
        #gameCanvas { background: #000; display: block; object-fit: contain; }
        /* CRT Scanline Effect */
        .scanlines { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); background-size: 100% 4px, 3px 100%; z-index: 10; opacity: 0.6; }
    </style>
</head>
<body>

<div class="game-container">
    <canvas id="gameCanvas" width="800" height="1000"></canvas>
    <div class="scanlines"></div>
</div>

<script>
/**
 * GALAXY VANGUARD - 7/10 Edition
 * Features: Synth Audio, Screen Shake, Hit Flashes, Combo Multipliers, Engine Trails
 */

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const WIDTH = canvas.width; const HEIGHT = canvas.height;

// --- RETRO AUDIO SYNTHESIZER ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const sfx = {
    play: (type) => {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        
        const now = audioCtx.currentTime;
        if (type === 'shoot') {
            osc.type = 'square'; osc.frequency.setValueAtTime(400, now); osc.frequency.exponentialRampToValueAtTime(100, now + 0.1);
            gain.gain.setValueAtTime(0.05, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
            osc.start(now); osc.stop(now + 0.1);
        } else if (type === 'hit') {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, now); osc.frequency.exponentialRampToValueAtTime(50, now + 0.1);
            gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0.01, now + 0.1);
            osc.start(now); osc.stop(now + 0.1);
        } else if (type === 'explosion') {
            osc.type = 'triangle'; osc.frequency.setValueAtTime(50, now); osc.frequency.exponentialRampToValueAtTime(10, now + 0.3);
            gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
            osc.start(now); osc.stop(now + 0.3);
        } else if (type === 'powerup') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(400, now); osc.frequency.linearRampToValueAtTime(800, now + 0.2);
            gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0.01, now + 0.2);
            osc.start(now); osc.stop(now + 0.2);
        }
    }
};

// --- INPUT MANAGEMENT ---
const keys = {};
const keyMap = { 'w':'up', 'a':'left', 's':'down', 'd':'right', 'ArrowUp':'up', 'ArrowLeft':'left', 'ArrowDown':'down', 'ArrowRight':'right', ' ':'space', 'Escape':'esc' };
let spacePressed = false; let escPressed = false;

window.addEventListener('keydown', e => {
    if (keyMap[e.key]) keys[keyMap[e.key]] = true;
    if (e.key === ' ' && !spacePressed) { keys['triggerSpace'] = true; spacePressed = true; }
    if (e.key === 'Escape' && !escPressed) { keys['triggerEsc'] = true; escPressed = true; }
});
window.addEventListener('keyup', e => {
    if (keyMap[e.key]) keys[keyMap[e.key]] = false;
    if (e.key === ' ') spacePressed = false;
    if (e.key === 'Escape') escPressed = false;
});

// --- UTILITIES & EFFECTS ---
const MathUtils = {
    clamp: (val, min, max) => Math.max(min, Math.min(max, val)),
    rand: (min, max) => Math.random() * (max - min) + min,
    distSq: (x1, y1, x2, y2) => (x2-x1)**2 + (y2-y1)**2,
    normalizeDiag: 0.7071
};

let screenShake = 0;
function addShake(amount) { screenShake = Math.min(screenShake + amount, 30); }

// --- OBJECT POOLER ---
class Pool {
    constructor(factory, size) { this.items = Array.from({length: size}, factory); }
    get() { for (let i=0; i<this.items.length; i++) if (!this.items[i].active) return this.items[i]; return null; }
    update(dt) { this.items.forEach(i => { if (i.active) i.update(dt); }); }
    draw(ctx) { this.items.forEach(i => { if (i.active) i.draw(ctx); }); }
}

// --- ENTITIES ---
class ParallaxBg {
    constructor() {
        this.stars = Array.from({length: 120}, () => ({
            x: MathUtils.rand(0, WIDTH), y: MathUtils.rand(0, HEIGHT),
            z: MathUtils.rand(1, 4), size: MathUtils.rand(1, 2.5)
        }));
    }
    update(dt) {
        let speedBoost = player.vy < -100 ? 2 : 1; // Stars move faster if player moves up
        this.stars.forEach(s => {
            s.y += (60 / s.z) * speedBoost * dt;
            if (s.y > HEIGHT) s.y = 0;
        });
    }
    draw(ctx) {
        ctx.save();
        ctx.fillStyle = game.isLegendaryAccount ? "rgba(255, 0, 85, 0.04)" : "rgba(255, 255, 255, 0.03)";
        ctx.font = "bold 140px 'Courier New'"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText("ADVIK", WIDTH / 2, HEIGHT / 2);
        ctx.restore();

        ctx.fillStyle = '#fff';
        this.stars.forEach(s => {
            ctx.globalAlpha = 1 / s.z;
            ctx.fillRect(s.x, s.y, s.size, s.size);
        });
        ctx.globalAlpha = 1;
    }
}

class Particle {
    constructor() { this.active = false; }
    spawn(x, y, vx, vy, color, life) {
        this.active = true; this.x = x; this.y = y; this.vx = vx; this.vy = vy;
        this.color = color; this.life = life; this.maxLife = life;
    }
    update(dt) {
        this.x += this.vx * dt; this.y += this.vy * dt;
        this.vx *= 0.92; this.vy *= 0.92; this.life -= dt;
        if (this.life <= 0) this.active = false;
    }
    draw(ctx) {
        ctx.globalAlpha = Math.max(0, this.life / this.maxLife);
        ctx.fillStyle = this.color;
        ctx.shadowBlur = 10; ctx.shadowColor = this.color;
        ctx.beginPath(); ctx.arc(this.x, this.y, 2, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = 1; ctx.shadowBlur = 0;
    }
}

class Bullet {
    constructor() { this.active = false; }
    spawn(x, y, vx, vy, isPlayer, type = 'normal') {
        this.active = true; this.x = x; this.y = y; this.vx = vx; this.vy = vy;
        this.isPlayer = isPlayer; this.type = type; this.radius = type === 'beam' ? 15 : 4;
        this.damage = type === 'beam' ? 5 : 1;
    }
    update(dt) {
        this.x += this.vx * dt; this.y += this.vy * dt;
        if (this.x < -50 || this.x > WIDTH+50 || this.y < -50 || this.y > HEIGHT+50) this.active = false;
    }
    draw(ctx) {
        ctx.fillStyle = this.isPlayer ? (this.type==='beam' ? '#ff0' : '#0ff') : '#f22';
        ctx.shadowBlur = 15; ctx.shadowColor = ctx.fillStyle;
        if (this.type === 'beam') { ctx.fillRect(this.x - 10, this.y - 40, 20, 80); } 
        else { ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2); ctx.fill(); }
        ctx.shadowBlur = 0;
    }
}

class PowerUpDrop {
    constructor() { this.active = false; }
    spawn(x, y, type) {
        this.active = true; this.x = x; this.y = y; this.type = type;
        this.time = 0; this.radius = 12;
    }
    update(dt) {
        this.time += dt; this.y += 100 * dt; this.x += Math.sin(this.time * 3) * 50 * dt;
        if (this.y > HEIGHT + 20) this.active = false;
    }
    draw(ctx) {
        ctx.strokeStyle = this.type === 'SPREAD' ? '#0f0' : this.type === 'BEAM' ? '#ff0' : '#22f';
        ctx.lineWidth = 2; ctx.shadowBlur = 15; ctx.shadowColor = ctx.strokeStyle;
        ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2); ctx.stroke();
        ctx.fillStyle = '#fff'; ctx.font = 'bold 12px Courier'; ctx.textAlign = 'center'; ctx.fillText(this.type, this.x, this.y+4);
        ctx.shadowBlur = 0;
    }
}

class Enemy {
    constructor() { this.active = false; }
    spawn(x, y, archetype) {
        this.active = true; this.x = x; this.y = y; this.archetype = archetype;
        this.time = 0; this.hitFlashTimer = 0;
        this.hp = archetype === 'elite' ? 12 : (archetype === 'kamikaze' ? 2 : (archetype === 'boss_judgment' ? 350 : 4));
        this.maxHp = this.hp;
        this.radius = archetype === 'boss_judgment' ? 80 : (archetype === 'elite' ? 25 : 15);
        this.fireTimer = MathUtils.rand(0.5, 2.0);
        this.startX = x; this.state = 'enter'; this.bossDirection = 1;
    }
    update(dt) {
        this.time += dt;
        if (this.hitFlashTimer > 0) this.hitFlashTimer -= dt;
        let speedMod = 100 * game.speedMultiplier;

        if (this.archetype === 'grunt') {
            this.y += speedMod * dt; this.x = this.startX + Math.sin(this.time * 2) * 100;
            this.fireTimer -= dt;
            if (this.fireTimer <= 0) { this.fire(0, 300 * game.bulletSpeedMultiplier); this.fireTimer = MathUtils.rand(1.5, 3.0) / game.fireRateMultiplier; }
        } else if (this.archetype === 'elite') {
            this.y += (speedMod * 0.4) * dt; this.x += (player.x - this.x) * 2 * dt;
            this.fireTimer -= dt;
            if (this.fireTimer <= 0) {
                let angle = Math.atan2(player.y - this.y, player.x - this.x);
                this.fire(Math.cos(angle) * 350 * game.bulletSpeedMultiplier, Math.sin(angle) * 350 * game.bulletSpeedMultiplier);
                this.fireTimer = MathUtils.rand(1.2, 2.5) / game.fireRateMultiplier;
            }
        } else if (this.archetype === 'kamikaze') {
            if (this.state === 'enter') {
                this.y += (speedMod * 2) * dt;
                if (this.y > HEIGHT * 0.25) {
                    this.state = 'dive';
                    let angle = Math.atan2(player.y - this.y, player.x - this.x);
                    this.vx = Math.cos(angle) * 600 * game.speedMultiplier; this.vy = Math.sin(angle) * 600 * game.speedMultiplier;
                }
            } else { this.x += this.vx * dt; this.y += this.vy * dt; }
        } else if (this.archetype === 'boss_judgment') {
            if (this.state === 'enter') {
                this.y += 80 * dt; if (this.y >= 180) this.state = 'fight';
            } else {
                this.x += this.bossDirection * 180 * game.speedMultiplier * dt;
                if (this.x < 100 || this.x > WIDTH - 100) { this.bossDirection *= -1; this.x = MathUtils.clamp(this.x, 100, WIDTH - 100); }
                this.fireTimer -= dt;
                if (this.fireTimer <= 0) {
                    sfx.play('shoot');
                    if (this.hp > this.maxHp * 0.5) {
                        for (let i = -2; i <= 2; i++) this.fire(i * 80, 400 * game.bulletSpeedMultiplier);
                        this.fireTimer = 0.7 / game.fireRateMultiplier;
                    } else {
                        let angle = Math.atan2(player.y - this.y, player.x - this.x);
                        this.fire(Math.cos(angle)*450, Math.sin(angle)*450);
                        for(let j=0; j<4; j++) { let rAngle = MathUtils.rand(0, Math.PI); this.fire(Math.cos(rAngle)*250, Math.sin(rAngle)*250); }
                        this.fireTimer = 0.35 / game.fireRateMultiplier;
                    }
                }
            }
        }

        if ((this.y > HEIGHT + 50 && this.archetype !== 'boss_judgment') || this.hp <= 0) {
            if (this.hp <= 0) this.die(); else this.active = false;
        }
    }
    fire(vx, vy) {
        let b = bulletPool.get();
        if (b) b.spawn(this.x, this.y + (this.radius * 0.8), vx, vy, false);
    }
    die() {
        this.active = false;
        sfx.play('explosion');
        addShake(this.archetype === 'boss_judgment' ? 25 : (this.archetype === 'elite' ? 5 : 2));
        
        let baseScore = this.archetype === 'elite' ? 500 : (this.archetype === 'boss_judgment' ? 10000 : 100);
        game.score += Math.floor(baseScore * game.comboMultiplier);
        
        // Add Combo Juice
        game.comboMultiplier += 0.1;
        game.comboTimer = 3.0;

        if (this.archetype === 'boss_judgment') {
            spawnExplosion(this.x, this.y, '#ff0055', 100);
            localStorage.setItem('galaxy_vanguard_legend', 'TRUE');
            game.isLegendaryAccount = true; game.hasJustEarnedLegend = true;
        } else {
            spawnExplosion(this.x, this.y, this.archetype === 'elite' ? '#f0f' : '#f00', 30);
        }

        if (this.archetype === 'boss_judgment' || Math.random() > 0.80) {
            let p = powerUpPool.get();
            const types = ['SPREAD', 'BEAM', 'SHIELD'];
            if (p) p.spawn(this.x, this.y, types[Math.floor(Math.random() * types.length)]);
        }
    }
    draw(ctx) {
        ctx.strokeStyle = this.archetype === 'boss_judgment' ? '#ff0055' : (this.archetype === 'elite' ? '#f0f' : (this.archetype === 'kamikaze' ? '#fa0' : '#f44'));
        ctx.lineWidth = this.archetype === 'boss_judgment' ? 4 : 2;
        ctx.shadowBlur = 15; ctx.shadowColor = ctx.strokeStyle;
        
        // Hit Flash Logic
        if (this.hitFlashTimer > 0) { ctx.fillStyle = '#fff'; ctx.shadowColor = '#fff'; }
        
        ctx.beginPath();
        if (this.archetype === 'grunt') {
            ctx.moveTo(this.x, this.y + 15); ctx.lineTo(this.x - 15, this.y - 15); ctx.lineTo(this.x + 15, this.y - 15);
        } else if (this.archetype === 'elite') {
            ctx.moveTo(this.x, this.y + 25); ctx.lineTo(this.x - 25, this.y); ctx.lineTo(this.x, this.y - 25); ctx.lineTo(this.x + 25, this.y);
        } else if (this.archetype === 'kamikaze') {
            ctx.moveTo(this.x, this.y + 15); ctx.lineTo(this.x - 10, this.y - 10); ctx.lineTo(this.x, this.y); ctx.lineTo(this.x + 10, this.y - 10);
        } else if (this.archetype === 'boss_judgment') {
            ctx.moveTo(this.x, this.y + 50); ctx.lineTo(this.x - 60, this.y - 10); ctx.lineTo(this.x - 40, this.y - 40); ctx.lineTo(this.x + 40, this.y - 40); ctx.lineTo(this.x + 60, this.y - 10);
        }
        ctx.closePath(); 
        
        if (this.hitFlashTimer > 0) ctx.fill(); else ctx.stroke();
        ctx.shadowBlur = 0;

        if (this.archetype === 'boss_judgment' && this.state === 'fight') {
            ctx.fillStyle = '#222'; ctx.fillRect(WIDTH/2 - 200, 60, 400, 10);
            ctx.fillStyle = '#ff0055'; ctx.fillRect(WIDTH/2 - 200, 60, 400 * (this.hp / this.maxHp), 10);
        }
    }
}

class Player {
    constructor() { this.reset(); this.trail = []; }
    reset() {
        this.x = WIDTH / 2; this.y = HEIGHT - 100; this.vx = 0; this.vy = 0;
        this.accel = 3000; this.friction = 0.82; this.radius = 12;
        this.fireCooldown = 0.12; this.fireTimer = 0;
        this.inventory = []; this.activeBuff = null; this.buffTimer = 0;
        this.shieldHits = 0; this.lives = 3; this.invulnTimer = 2;
        this.trail = [];
    }
    update(dt) {
        if (this.invulnTimer > 0) this.invulnTimer -= dt;

        if (this.activeBuff) {
            this.buffTimer -= dt;
            if (this.buffTimer <= 0) { this.activeBuff = null; this.shieldHits = 0; }
        }

        if (keys.triggerSpace) {
            keys.triggerSpace = false;
            if (this.inventory.length > 0) {
                sfx.play('powerup');
                this.activeBuff = this.inventory.pop(); this.buffTimer = 8.0;
                if (this.activeBuff === 'SHIELD') this.shieldHits = 2;
            }
        }

        let dx = 0, dy = 0;
        if (keys.left) dx -= 1; if (keys.right) dx += 1;
        if (keys.up) dy -= 1; if (keys.down) dy += 1;
        if (dx !== 0 && dy !== 0) { dx *= MathUtils.normalizeDiag; dy *= MathUtils.normalizeDiag; }

        this.vx += dx * this.accel * dt; this.vy += dy * this.accel * dt;
        this.vx *= this.friction; this.vy *= this.friction;
        this.x += this.vx * dt; this.y += this.vy * dt;

        this.x = MathUtils.clamp(this.x, this.radius, WIDTH - this.radius);
        this.y = MathUtils.clamp(this.y, this.radius, HEIGHT - this.radius);

        // Engine Trail Logic
        if (Math.abs(this.vx) > 10 || Math.abs(this.vy) > 10) {
            this.trail.push({x: this.x, y: this.y + 10, life: 0.15});
        }
        for (let i = this.trail.length - 1; i >= 0; i--) {
            this.trail[i].life -= dt;
            if (this.trail[i].life <= 0) this.trail.splice(i, 1);
        }

        this.fireTimer -= dt;
        if (this.fireTimer <= 0 && game.state === 'PLAY') {
            this.fireTimer = this.activeBuff === 'BEAM' ? 0.05 : this.fireCooldown;
            this.fire();
        }
    }
    fire() {
        sfx.play('shoot');
        if (this.activeBuff === 'SPREAD') {
            [-15, 0, 15].forEach(angle => {
                let rad = angle * Math.PI/180; let b = bulletPool.get();
                if (b) b.spawn(this.x, this.y - 15, Math.sin(rad)*900, -Math.cos(rad)*900, true);
            });
        } else if (this.activeBuff === 'BEAM') {
            let b = bulletPool.get(); if (b) b.spawn(this.x, this.y - 20, 0, -1800, true, 'beam');
        } else {
            let b = bulletPool.get(); if (b) b.spawn(this.x, this.y - 15, 0, -1000, true);
        }
    }
    hit() {
        if (this.invulnTimer > 0) return;
        if (this.shieldHits > 0) {
            sfx.play('hit'); addShake(5);
            this.shieldHits--;
            if (this.shieldHits <= 0) { this.activeBuff = null; this.buffTimer = 0; }
            spawnExplosion(this.x, this.y, '#22f', 20); return;
        }
        this.lives--; game.comboMultiplier = 1.0; // Reset combo on hit
        sfx.play('explosion'); addShake(15);
        spawnExplosion(this.x, this.y, '#0ff', 60);
        if (this.lives <= 0) game.state = 'GAMEOVER';
        else { this.x = WIDTH/2; this.y = HEIGHT - 100; this.invulnTimer = 2; this.vx = 0; this.vy = 0; }
    }
    draw(ctx) {
        // Draw Trail
        ctx.fillStyle = '#0ff';
        this.trail.forEach(t => {
            ctx.globalAlpha = t.life / 0.15;
            ctx.beginPath(); ctx.arc(t.x, t.y, 4, 0, Math.PI*2); ctx.fill();
        });
        ctx.globalAlpha = 1.0;

        if (this.invulnTimer > 0 && Math.floor(this.invulnTimer * 10) % 2 === 0) return;
        ctx.shadowBlur = 15; ctx.shadowColor = '#0ff'; ctx.strokeStyle = '#0ff'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(this.x, this.y - 20); ctx.lineTo(this.x - 15, this.y + 15); ctx.lineTo(this.x, this.y + 5); ctx.lineTo(this.x + 15, this.y + 15);
        ctx.closePath(); ctx.stroke();
        
        if (this.shieldHits > 0) { ctx.strokeStyle = '#22f'; ctx.shadowColor = '#22f'; ctx.beginPath(); ctx.arc(this.x, this.y, 30, 0, Math.PI*2); ctx.stroke(); }
        ctx.shadowBlur = 0;
    }
}

// --- GLOBALS & POOLS ---
const bg = new ParallaxBg(); const player = new Player();
const bulletPool = new Pool(() => new Bullet(), 400); const particlePool = new Pool(() => new Particle(), 600);
const enemyPool = new Pool(() => new Enemy(), 80); const powerUpPool = new Pool(() => new PowerUpDrop(), 20);

function spawnExplosion(x, y, color, count) {
    for(let i=0; i<count; i++) {
        let p = particlePool.get();
        if (p) { let angle = MathUtils.rand(0, Math.PI*2); let speed = MathUtils.rand(50, 400); p.spawn(x, y, Math.cos(angle)*speed, Math.sin(angle)*speed, color, MathUtils.rand(0.2, 0.8)); }
    }
}

// --- GAME STATE & RANK ENGINE ---
const game = {
    state: 'START', score: 0, highScore: 0,
    waveIndex: 1, waveState: 'BANNER', waveTimer: 3.0, spawnQueue: [],
    rankClass: 'ROOKIE', rankTier: 'I', rankColor: '#a8a8a8',
    speedMultiplier: 1.0, hpMultiplier: 1.0, fireRateMultiplier: 1.0, bulletSpeedMultiplier: 1.0,
    isLegendaryAccount: false, hasJustEarnedLegend: false,
    comboMultiplier: 1.0, comboTimer: 0
};

if (localStorage.getItem('galaxy_vanguard_legend') === 'TRUE') game.isLegendaryAccount = true;

function updateRankTiers() {
    if (game.waveIndex > 30 || game.isLegendaryAccount) {
        game.rankClass = 'LEGENDARY'; game.rankTier = '∞'; game.rankColor = '#ff0055';
        let overflow = Math.max(0, game.waveIndex - 30);
        game.speedMultiplier = 1.90 + (overflow * 0.10); game.hpMultiplier = 3.20 + (overflow * 0.25);
        game.fireRateMultiplier = 2.40 + (overflow * 0.15); game.bulletSpeedMultiplier = 1.90 + (overflow * 0.08); return;
    }
    const classes = ['ROOKIE', 'VETERAN', 'ELITE', 'PRO', 'MASTER', 'GRAND MASTER'];
    let idx = MathUtils.clamp(game.waveIndex - 1, 0, 29);
    game.rankClass = classes[Math.floor(idx / 5)]; game.rankTier = ['V', 'IV', 'III', 'II', 'I'][(idx % 5)];
    switch(game.rankClass) {
        case 'ROOKIE': game.rankColor = '#a8a8a8'; game.speedMultiplier = 1.0; game.hpMultiplier = 1.0; game.fireRateMultiplier = 1.0; game.bulletSpeedMultiplier = 1.0; break;
        case 'VETERAN': game.rankColor = '#cd7f32'; game.speedMultiplier = 1.15; game.hpMultiplier = 1.2; game.fireRateMultiplier = 1.1; game.bulletSpeedMultiplier = 1.1; break;
        case 'ELITE': game.rankColor = '#e5e4e2'; game.speedMultiplier = 1.30; game.hpMultiplier = 1.5; game.fireRateMultiplier = 1.3; game.bulletSpeedMultiplier = 1.25; break;
        case 'PRO': game.rankColor = '#f9d71c'; game.speedMultiplier = 1.45; game.hpMultiplier = 1.9; game.fireRateMultiplier = 1.5; game.bulletSpeedMultiplier = 1.4; break;
        case 'MASTER': game.rankColor = '#00ffcc'; game.speedMultiplier = 1.60; game.hpMultiplier = 2.4; game.fireRateMultiplier = 1.8; game.bulletSpeedMultiplier = 1.6; break;
        case 'GRAND MASTER': game.rankColor = '#fa00ff'; game.speedMultiplier = 1.75; game.hpMultiplier = 2.9; game.fireRateMultiplier = 2.1; game.bulletSpeedMultiplier = 1.75; break;
    }
}

function generateRankedWave(wave) {
    game.spawnQueue = []; updateRankTiers();
    if (wave === 30 && !game.hasJustEarnedLegend) { game.spawnQueue.push({ type: 'boss_judgment', x: WIDTH / 2 }); return; }

    if (game.rankClass === 'LEGENDARY') {
        let intensity = 6 + Math.floor(wave * 0.3);
        if (Math.random() > 0.6) game.spawnQueue.push({ type: 'elite', x: WIDTH / 2 });
        for (let i = 0; i < intensity; i++) {
            let rx = MathUtils.rand(80, WIDTH - 80); let r = Math.random();
            game.spawnQueue.push({ type: r < 0.25 ? 'grunt' : (r < 0.60 ? 'elite' : 'kamikaze'), x: rx });
        }
    } else if (game.rankClass === 'ROOKIE') {
        let count = 3 + wave; for (let i=0; i<count; i++) game.spawnQueue.push({ type: 'grunt', x: 80 + (i * (WIDTH - 160) / Math.max(1, count - 1)) });
    } else if (game.rankClass === 'VETERAN') {
        for (let i=0; i<4; i++) game.spawnQueue.push({ type: 'grunt', x: 100 + (i * 150) }); game.spawnQueue.push({ type: 'kamikaze', x: WIDTH / 2 });
    } else if (game.rankClass === 'ELITE') {
        game.spawnQueue.push({ type: 'elite', x: WIDTH / 3 }); game.spawnQueue.push({ type: 'elite', x: (WIDTH / 3) * 2 });
        game.spawnQueue.push({ type: 'grunt', x: 100 }); game.spawnQueue.push({ type: 'grunt', x: WIDTH - 100 });
    } else if (game.rankClass === 'PRO') {
        for(let i=0; i<3; i++) game.spawnQueue.push({ type: 'kamikaze', x: MathUtils.rand(150, WIDTH-150) }); for(let i=0; i<2; i++) game.spawnQueue.push({ type: 'elite', x: 200 + i*400 });
    } else if (game.rankClass === 'MASTER') {
        game.spawnQueue.push({ type: 'elite', x: WIDTH/2 });
        for(let i=0; i<3; i++) { game.spawnQueue.push({ type: 'grunt', x: 80 + i*180 }); game.spawnQueue.push({ type: 'kamikaze', x: MathUtils.rand(100, WIDTH-100) }); }
    } else if (game.rankClass === 'GRAND MASTER') {
        let total = 6 + (wave % 5); for (let i=0; i<total; i++) game.spawnQueue.push({ type: Math.random() > 0.5 ? 'elite' : 'kamikaze', x: MathUtils.rand(80, WIDTH - 80) });
    }
}

function manageWaves(dt) {
    if (game.state !== 'PLAY') return;

    // Handle Combo Timer
    if (game.comboTimer > 0) {
        game.comboTimer -= dt;
        if (game.comboTimer <= 0) game.comboMultiplier = 1.0;
    }

    if (game.waveState === 'BANNER') {
        game.waveTimer -= dt;
        if (game.waveTimer <= 0) { game.waveState = 'ACTION'; generateRankedWave(game.waveIndex); game.waveTimer = 0.0; } return;
    }

    if (game.waveState === 'ACTION') {
        if (game.spawnQueue.length > 0) {
            game.waveTimer -= dt;
            if (game.waveTimer <= 0) {
                let node = game.spawnQueue.shift(); let e = enemyPool.get();
                if (e) { e.spawn(node.x, node.type === 'boss_judgment' ? -100 : -40, node.type); e.hp = Math.ceil(e.hp * game.hpMultiplier); e.maxHp = e.hp; }
                game.waveTimer = node.type === 'boss_judgment' ? 4.0 : Math.max(0.12, 0.45 - (game.waveIndex * 0.01));
            }
        }
        let currentActiveEnemies = enemyPool.items.filter(i => i.active).length;
        if (game.spawnQueue.length === 0 && currentActiveEnemies === 0) {
            if (game.waveIndex === 30 && !game.isLegendaryAccount && !game.hasJustEarnedLegend) return;
            game.waveIndex++; game.waveState = 'BANNER'; game.waveTimer = 3.5; updateRankTiers();
        }
    }
}

// --- COLLISION LOGIC ---
function resolveCollisions() {
    bulletPool.items.forEach(b => {
        if (!b.active) return;
        if (b.isPlayer) {
            enemyPool.items.forEach(e => {
                if (!e.active || !b.active) return;
                if (MathUtils.distSq(b.x, b.y, e.x, e.y) < (b.radius + e.radius)**2) {
                    e.hp -= b.damage; e.hitFlashTimer = 0.05; sfx.play('hit');
                    if (b.type !== 'beam') b.active = false;
                    spawnExplosion(b.x, b.y, '#fff', 5);
                }
            });
        } else {
            if (MathUtils.distSq(b.x, b.y, player.x, player.y) < (b.radius + player.radius)**2) { b.active = false; player.hit(); } 
            else if (player.shieldHits > 0 && MathUtils.distSq(b.x, b.y, player.x, player.y) < (b.radius + 30)**2) { b.active = false; }
        }
    });

    enemyPool.items.forEach(e => {
        if (!e.active) return;
        if (MathUtils.distSq(e.x, e.y, player.x, player.y) < (e.radius + player.radius)**2) {
            if(e.archetype !== 'boss_judgment') e.hp = 0; player.hit();
        } else if (player.shieldHits > 0 && MathUtils.distSq(e.x, e.y, player.x, player.y) < (e.radius + 30)**2) {
            if(e.archetype !== 'boss_judgment') e.hp = 0; player.shieldHits--;
            if (player.shieldHits <= 0) { player.activeBuff = null; player.buffTimer = 0; }
        }
    });

    powerUpPool.items.forEach(p => {
        if (!p.active) return;
        if (MathUtils.distSq(p.x, p.y, player.x, player.y) < (p.radius + player.radius)**2) {
            p.active = false; sfx.play('powerup');
            if (player.inventory.length < 3) player.inventory.push(p.type); else game.score += 500;
        }
    });
}

// --- HUD RENDERING ---
function drawHUD(ctx) {
    ctx.fillStyle = '#fff'; ctx.font = 'bold 20px Courier New'; ctx.textAlign = 'left';
    ctx.fillText(`SCORE: ${game.score}`, 20, 30);
    
    // Combo Multiplier Juice
    if (game.comboMultiplier > 1.0) {
        ctx.fillStyle = game.comboMultiplier > 2.0 ? '#fa0' : '#0ff';
        ctx.fillText(`x${game.comboMultiplier.toFixed(1)}`, 20, 55);
        ctx.fillRect(20, 65, 80 * (game.comboTimer / 3.0), 4);
    }

    ctx.textAlign = 'right'; ctx.fillStyle = '#fff';
    ctx.fillText(`HIGH: ${game.highScore}`, WIDTH - 20, 30);

    ctx.textAlign = 'center'; ctx.font = 'bold 18px Courier New';
    ctx.fillStyle = game.rankColor; ctx.shadowBlur = 15; ctx.shadowColor = game.rankColor;
    ctx.fillText(`${game.rankClass} ${game.rankTier}`, WIDTH / 2, 30);
    ctx.shadowBlur = 0;

    ctx.strokeStyle = '#0ff'; ctx.lineWidth = 1; ctx.shadowBlur = 10; ctx.shadowColor = '#0ff';
    for (let i = 0; i < player.lives; i++) {
        ctx.beginPath(); let lx = 30 + i * 25, ly = HEIGHT - 80;
        ctx.moveTo(lx, ly-10); ctx.lineTo(lx-8, ly+8); ctx.lineTo(lx, ly+3); ctx.lineTo(lx+8, ly+8);
        ctx.closePath(); ctx.stroke();
    }
    ctx.shadowBlur = 0;

    ctx.textAlign = 'left'; ctx.font = '14px Courier New'; ctx.fillStyle = '#fff';
    ctx.fillText('MODULES [SPACE]', 20, HEIGHT - 50);
    player.inventory.forEach((buff, i) => {
        ctx.fillStyle = buff === 'SPREAD' ? '#0f0' : buff === 'BEAM' ? '#ff0' : '#22f';
        ctx.fillRect(20 + i * 42, HEIGHT - 35, 32, 16);
    });

    if (player.activeBuff) {
        ctx.textAlign = 'right'; ctx.fillStyle = '#fff';
        ctx.fillText(`ACTIVE: ${player.activeBuff}`, WIDTH - 20, HEIGHT - 50);
        ctx.fillStyle = '#222'; ctx.fillRect(WIDTH - 140, HEIGHT - 35, 120, 16);
        ctx.fillStyle = player.activeBuff === 'SPREAD' ? '#0f0' : player.activeBuff === 'BEAM' ? '#ff0' : '#22f';
        ctx.fillRect(WIDTH - 140, HEIGHT - 35, 120 * (player.buffTimer / 8.0), 16);
    }
}

function drawMenu(ctx, title, sub) {
    ctx.fillStyle = 'rgba(0,0,0,0.85)'; ctx.fillRect(0,0,WIDTH,HEIGHT);
    ctx.fillStyle = game.isLegendaryAccount ? '#ff0055' : '#0ff'; 
    ctx.font = 'bold 46px Courier New'; ctx.textAlign = 'center'; ctx.shadowBlur = 25; ctx.shadowColor = ctx.fillStyle;
    ctx.fillText(title, WIDTH/2, HEIGHT/2 - 30);
    ctx.fillStyle = '#fff'; ctx.font = '20px Courier New'; ctx.shadowBlur = 0;
    
    // Pulsing Subtitle
    ctx.globalAlpha = 0.5 + Math.sin(Date.now() / 200) * 0.5;
    ctx.fillText(sub, WIDTH/2, HEIGHT/2 + 30);
    ctx.globalAlpha = 1.0;
}

// --- MAIN LOOP ---
let lastTime = 0;

function gameLoop(timestamp) {
    let dt = (timestamp - lastTime) / 1000; lastTime = timestamp; if (dt > 0.1) dt = 0.1;

    ctx.fillStyle = '#050505'; ctx.fillRect(0, 0, WIDTH, HEIGHT);
    
    // Apply Screen Shake Matrix
    ctx.save();
    if (screenShake > 0.5) {
        let dx = MathUtils.rand(-screenShake, screenShake); let dy = MathUtils.rand(-screenShake, screenShake);
        ctx.translate(dx, dy); screenShake *= 0.9; // Dampen shake over time
    }

    bg.update(dt); bg.draw(ctx);

    if (keys.triggerEsc) { keys.triggerEsc = false; if (game.state === 'PLAY') game.state = 'PAUSE'; else if (game.state === 'PAUSE') game.state = 'PLAY'; }

    if (game.state === 'START') {
        if (game.isLegendaryAccount) drawMenu(ctx, 'WELCOME BACK, LEGEND', 'Press [SPACE] to Enter Infinite Domain');
        else drawMenu(ctx, 'GALAXY VANGUARD', 'Press [SPACE] to Authenticate');
        
        if (keys.triggerSpace) { 
            keys.triggerSpace = false; 
            if(audioCtx.state === 'suspended') audioCtx.resume();
            game.waveIndex = game.isLegendaryAccount ? 31 : 1;
            game.waveState = 'BANNER'; game.waveTimer = 3.0;
            updateRankTiers(); game.state = 'PLAY'; 
        }
    } 
    else if (game.state === 'PLAY') {
        player.update(dt); manageWaves(dt);
        enemyPool.update(dt); bulletPool.update(dt); powerUpPool.update(dt); particlePool.update(dt);
        resolveCollisions();

        powerUpPool.draw(ctx); bulletPool.draw(ctx); player.draw(ctx); enemyPool.draw(ctx); particlePool.draw(ctx);
        drawHUD(ctx);

        if (game.waveState === 'BANNER') {
            ctx.save(); ctx.fillStyle = 'rgba(10, 10, 14, 0.9)'; ctx.fillRect(0, HEIGHT / 2 - 100, WIDTH, 200);
            let displayBorderColor = (game.waveIndex === 30) ? '#ff0055' : game.rankColor;
            ctx.strokeStyle = displayBorderColor; ctx.lineWidth = 3; ctx.strokeRect(-5, HEIGHT / 2 - 100, WIDTH + 10, 200);
            ctx.shadowBlur = 25; ctx.shadowColor = displayBorderColor; ctx.fillStyle = displayBorderColor;
            ctx.font = 'bold 24px "Courier New"'; ctx.textAlign = 'center';
            if (game.waveIndex === 30) {
                ctx.fillText('CRITICAL CRISIS DETECTED', WIDTH / 2, HEIGHT / 2 - 35); ctx.fillStyle = '#fff'; ctx.font = 'bold 38px "Courier New"'; ctx.fillText('APEX BOSS: JUDGMENT', WIDTH / 2, HEIGHT / 2 + 25);
            } else {
                ctx.fillText(`CURRENT RANK: ${game.rankClass} ${game.rankTier}`, WIDTH / 2, HEIGHT / 2 - 35); ctx.fillStyle = '#fff'; ctx.font = 'bold 38px "Courier New"'; ctx.fillText(`WAVE ${game.waveIndex}`, WIDTH / 2, HEIGHT / 2 + 25);
            }
            ctx.restore();
        }
    } 
    else if (game.state === 'PAUSE') {
        powerUpPool.draw(ctx); bulletPool.draw(ctx); player.draw(ctx); enemyPool.draw(ctx); particlePool.draw(ctx); drawHUD(ctx);
        drawMenu(ctx, 'SYSTEM SUSPENDED', 'Press [ESC] to Re-engage');
    } 
    else if (game.state === 'GAMEOVER') {
        powerUpPool.draw(ctx); bulletPool.draw(ctx); enemyPool.draw(ctx); particlePool.draw(ctx); drawHUD(ctx);
        drawMenu(ctx, 'VANGUARD DOWN', 'Press [SPACE] to Re-deploy');
        if (game.score > game.highScore) game.highScore = game.score;
        if (keys.triggerSpace) {
            keys.triggerSpace = false; player.reset();
            game.score = 0; game.comboMultiplier = 1.0;
            game.waveIndex = game.isLegendaryAccount ? 31 : 1; 
            game.waveState = 'BANNER'; game.waveTimer = 3.0; updateRankTiers();
            bulletPool.items.forEach(i=>i.active=false); enemyPool.items.forEach(i=>i.active=false); powerUpPool.items.forEach(i=>i.active=false); particlePool.items.forEach(i=>i.active=false);
            game.state = 'PLAY';
        }
    }
    
    ctx.restore(); // Restore from Screen Shake
    requestAnimationFrame(gameLoop);
}

requestAnimationFrame(t => { lastTime = t; requestAnimationFrame(gameLoop); });
</script>
